name: Build and generate progress report

on:
  push:
    branches:
      - progress_generation
    paths:
      - ".github/workflows/report.yml"
      - "Makefile"
      - "linker.ld"
      - "tools/gen_decomp_progress.py"
      - "tools/requirements.txt"
      - "tools/agbcc/**"
      - "tools/extract_assets.py"
      - "src/**"
      - "asm/**"
      - "include/**"
      - "data/**"

  pull_request:
    branches:
      - progress_generation

  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: wl4-progress-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-report:
    name: Build ROM and generate report
    runs-on: ubuntu-22.04

    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          set -euxo pipefail

          sudo apt-get update
          sudo apt-get install -y             binutils-arm-none-eabi             build-essential             gcc-multilib             g++-multilib             libc6-dev-i386             flex             bison             git             wget             unzip             zip             file

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Rebuild project tools
        run: |
          set -euxo pipefail

          # Recreate the Python environment every run.
          rm -rf .venv

          # Remove only final generated artifacts.
          # Do NOT remove tools/agbcc/gcc or tools/agbcc/gcc_arm:
          # agbcc/build.sh expects both directories to exist.
          rm -f             tools/agbcc/agbcc             tools/agbcc/old_agbcc             tools/agbcc/agbcc_arm             tools/agbcc/libgcc.a             tools/agbcc/libc.a

          make tools

      - name: Verify project tools
        run: |
          set -euxo pipefail

          test -x tools/agbcc/agbcc
          test -x tools/agbcc/old_agbcc
          test -x tools/agbcc/agbcc_arm
          test -x .venv/bin/python

          ls -l             tools/agbcc/agbcc             tools/agbcc/old_agbcc             tools/agbcc/agbcc_arm

          file             tools/agbcc/agbcc             tools/agbcc/old_agbcc             tools/agbcc/agbcc_arm

          .venv/bin/python --version
          .venv/bin/python -m pip --version

      - name: Download private baserom
        env:
          GH_TOKEN: ${{ secrets.WL4_ASSETS_TOKEN }}
        run: |
          set -euxo pipefail

          test -n "$GH_TOKEN"

          gh release download baserom-us-v1             --repo TsilaAllaoui/wl4-ci-assets             --pattern "warioland4-us.zip"             --output warioland4-us.zip

          unzip -o warioland4-us.zip

          ROM_FILE="$(find . -maxdepth 2 -type f -iname '*.gba' | head -n 1)"
          test -n "$ROM_FILE"

          if [ "$ROM_FILE" != "./baserom_us.gba" ]; then
            mv "$ROM_FILE" baserom_us.gba
          fi

          test -s baserom_us.gba
          ls -lh baserom_us.gba

      - name: Verify baserom checksum
        run: |
          set -euxo pipefail

          ACTUAL_MD5="$(md5sum baserom_us.gba | awk '{print $1}')"
          EXPECTED_MD5="5fe47355a33e3fabec2a1607af88a404"

          echo "Baserom MD5: $ACTUAL_MD5"
          test "$ACTUAL_MD5" = "$EXPECTED_MD5"

      - name: Extract assets from baserom
        run: |
          set -euxo pipefail

          test -x .venv/bin/python
          test -s baserom_us.gba

          make extract

      - name: Build Wario Land 4
        run: |
          set -euxo pipefail

          make clean
          make -j"$(nproc)"

      - name: Verify matching ROM
        run: |
          set -euxo pipefail

          test -s build/us/warioland4_us.gba

          ACTUAL_MD5="$(md5sum build/us/warioland4_us.gba | awk '{print $1}')"
          EXPECTED_MD5="5fe47355a33e3fabec2a1607af88a404"

          echo "Built ROM MD5: $ACTUAL_MD5"
          test "$ACTUAL_MD5" = "$EXPECTED_MD5"

      - name: Locate linker map
        id: map
        run: |
          set -euxo pipefail

          MAP_FILE=""

          for candidate in             build/us/warioland4.map             build/us/warioland4_us.map             build/warioland4.map
          do
            if [ -s "$candidate" ]; then
              MAP_FILE="$candidate"
              break
            fi
          done

          if [ -z "$MAP_FILE" ]; then
            echo "No linker map was found."
            find build -type f -name '*.map' -print || true
            exit 1
          fi

          echo "map_file=$MAP_FILE" >> "$GITHUB_OUTPUT"
          ls -lh "$MAP_FILE"

      - name: Generate HTML, SVG, and decomp.dev report
        run: |
          set -euxo pipefail

          python3 -m py_compile tools/gen_decomp_progress.py
          python3 tools/gen_decomp_progress.py

          test -s docs/progress.html
          test -s docs/progress-treemap.svg
          test -s report.json

      - name: Validate report.json
        run: |
          set -euxo pipefail

          python3 -m json.tool report.json >/dev/null

          python3 - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("report.json").read_text(encoding="utf-8"))

          assert report.get("version") == 2
          assert isinstance(report.get("measures"), dict)
          assert isinstance(report.get("units"), list)
          assert isinstance(report.get("categories"), list)

          measures = report["measures"]

          required_measures = (
              "total_code",
              "matched_code",
              "total_functions",
              "matched_functions",
              "complete_code",
              "total_units",
              "complete_units",
              "matched_code_percent",
              "matched_functions_percent",
          )

          for key in required_measures:
              assert key in measures, f"Missing measure: {key}"

          assert measures["total_code"] >= measures["matched_code"]
          assert measures["total_functions"] >= measures["matched_functions"]
          assert measures["total_units"] == len(report["units"])

          print("Report version:", report["version"])
          print("Units:", measures["total_units"])
          print(
              "Functions:",
              measures["matched_functions"],
              "/",
              measures["total_functions"],
          )
          print(
              "Code bytes:",
              measures["matched_code"],
              "/",
              measures["total_code"],
          )
          PY

      - name: Validate HTML controls
        run: |
          set -euxo pipefail

          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path

          class ProgressHTMLParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.ids = set()
                  self.statuses = set()
                  self.option_values = set()

              def handle_starttag(self, tag, attrs):
                  attributes = dict(attrs)

                  element_id = attributes.get("id")
                  if element_id:
                      self.ids.add(element_id)

                  status = attributes.get("data-status")
                  if status:
                      self.statuses.add(status)

                  if tag == "option" and attributes.get("value"):
                      self.option_values.add(attributes["value"])

          html_path = Path("docs/progress.html")
          assert html_path.is_file() and html_path.stat().st_size > 0

          parser = ProgressHTMLParser()
          parser.feed(html_path.read_text(encoding="utf-8"))

          required_ids = {"search", "module", "sort", "reset"}
          required_statuses = {"all", "matched", "not matched"}

          missing_ids = required_ids - parser.ids
          missing_statuses = required_statuses - parser.statuses

          assert not missing_ids, f"Missing control IDs: {sorted(missing_ids)}"
          assert not missing_statuses, (
              f"Missing status filters: {sorted(missing_statuses)}"
          )

          # Accept either the current sort values or the older generator values.
          size_sort_present = bool(
              {"size", "size-desc", "size-asc"} & parser.option_values
          )
          assert size_sort_present, (
              "Missing size sort option; found values: "
              f"{sorted(parser.option_values)}"
          )
          assert "module" in parser.option_values
          assert "name" in parser.option_values

          print("HTML control IDs:", sorted(parser.ids & required_ids))
          print("HTML status filters:", sorted(parser.statuses))
          print("HTML option values:", sorted(parser.option_values))
          PY

      - name: Validate SVG totals
        run: |
          set -euxo pipefail

          grep -q "Functions" docs/progress-treemap.svg
          grep -q "Code size" docs/progress-treemap.svg

      - name: Show progress summary
        run: |
          python3 - <<'PY'
          import json

          with open("report.json", encoding="utf-8") as report_file:
              report = json.load(report_file)

          measures = report["measures"]

          print(
              f"Code: {measures['matched_code']:,} / "
              f"{measures['total_code']:,} bytes "
              f"({measures['matched_code_percent']:.4f}%)"
          )

          print(
              f"Functions: {measures['matched_functions']:,} / "
              f"{measures['total_functions']:,} "
              f"({measures['matched_functions_percent']:.4f}%)"
          )

          print(
              f"Units: {measures['complete_units']:,} / "
              f"{measures['total_units']:,}"
          )
          PY

      - name: Upload decomp.dev progress artifact
        uses: actions/upload-artifact@v4
        with:
          name: us_report
          path: report.json
          if-no-files-found: error
          retention-days: 90
          compression-level: 9

      - name: Upload HTML and SVG progress artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wl4_visual_progress
          path: |
            docs/progress.html
            docs/progress-treemap.svg
          if-no-files-found: error
          retention-days: 30
          compression-level: 9

      - name: Upload linker map for debugging
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wl4-linker-map-debug
          path: |
            ${{ steps.map.outputs.map_file }}
            report.json
          if-no-files-found: ignore
          retention-days: 7
